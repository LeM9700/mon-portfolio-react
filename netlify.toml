[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Proxy /api/* calls to the Render backend
# After deploying to Render, replace the URL below with your actual Render service URL
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-APP-NAME.onrender.com/api/:splat"
  status = 200
  force = true

# SPA fallback — all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
